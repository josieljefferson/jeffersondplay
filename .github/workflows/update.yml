name: IPTV Auto Update

on:
  schedule:
    # Executar a cada 6 horas
    - cron: "0 */6 * * *"
  # Permitir execução manual
  workflow_dispatch:
  # Executar quando houver push na main
  push:
    branches:
      - main
    paths:
      - 'downloads/**'
      - '*.py'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: 📦 Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests
      
      - name: 🔍 Verificar arquivos
        run: |
          echo "📁 Arquivos no diretório:"
          ls -la
          echo ""
          echo "📁 Criando diretórios necessários:"
          mkdir -p downloads docs
          
          # Criar arquivo .gitkeep para manter a pasta
          touch downloads/.gitkeep
      
      - name: 🚀 Executar script de atualização
        run: python script_update.py
        env:
          PYTHONUNBUFFERED: 1
          PYTHONIOENCODING: utf-8
      
      - name: 📊 Verificar resultado
        run: |
          echo "📊 Estatísticas após execução:"
          if [ -f "docs/stats.json" ]; then
            cat docs/stats.json
          else
            echo "⚠️ Arquivo stats.json não encontrado"
          fi
          echo ""
          echo "📁 Arquivos gerados em docs/:"
          ls -la docs/
      
      - name: 💾 Commit automático
        run: |
          git config --global user.name "IPTV Bot"
          git config --global user.email "bot@jeffersondplay.com"
          
          # Adicionar apenas os arquivos importantes da pasta docs
          git add docs/playlists.m3u docs/channels.json docs/stats.json docs/metadata.json
          git add docs/index.html docs/player.html
          
          # Verificar se há mudanças
          if git diff --cached --quiet; then
            echo "✅ Sem mudanças para commit"
          else
            git commit -m "🔄 Auto-update: $(TZ='America/Fortaleza' date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Commit e push realizados com sucesso"
          fi