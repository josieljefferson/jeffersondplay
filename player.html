<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Web Player IPTV - Josiel Jefferson</title>
    <link href="https://vjs.zencdn.net/8.0.2/video-js.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            font-size: 1.5em;
        }
        
        .back-btn {
            background: #2c3e50;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: #e67e22;
        }
        
        .player-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .video-js {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
        }
        
        .channel-info {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .channel-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #e67e22;
        }
        
        .category {
            color: #888;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-size: 1em;
        }
        
        .search-box input:focus {
            outline: none;
            background: #2a2a2a;
        }
        
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        
        .category-btn {
            background: #2c3e50;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .category-btn.active {
            background: #e67e22;
        }
        
        .category-btn:hover {
            background: #e67e22;
        }
        
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }
        
        .channel-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .channel-card:hover {
            background: #2c3e50;
            transform: translateX(5px);
        }
        
        .channel-card.active {
            background: #e67e22;
        }
        
        .channel-card-logo {
            width: 50px;
            height: 50px;
            margin: 0 auto 8px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .channel-card-name {
            font-size: 0.85em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #888;
        }
        
        @media (max-width: 768px) {
            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .channel-card-name {
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📺 Web Player IPTV</h1>
            <a href="index.html" class="back-btn">← Voltar ao Dashboard</a>
        </div>
        
        <div class="player-container">
            <video id="video-player" class="video-js vjs-default-skin" controls preload="auto">
                <p class="vjs-no-js">Para assistir ative o JavaScript</p>
            </video>
        </div>
        
        <div class="channel-info" id="channel-info" style="display: none;">
            <div class="channel-name" id="current-channel-name">Nenhum canal selecionado</div>
            <div class="category" id="current-category">-</div>
        </div>
        
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 Buscar canal...">
        </div>
        
        <div class="categories" id="categories"></div>
        
        <div id="channels-container">
            <div class="loading">Carregando canais...</div>
        </div>
    </div>
    
    <script src="https://vjs.zencdn.net/8.0.2/video.min.js"></script>
    <script>
        const API_URL = '/api/get.php';
        const USERNAME = 'josielluz';
        const PASSWORD = '3264717';
        
        let player = null;
        let allChannels = [];
        let currentCategory = 'all';
        let searchTerm = '';
        
        // Inicializar player
        function initPlayer() {
            if (!player) {
                player = videojs('video-player', {
                    autoplay: true,
                    controls: true,
                    preload: 'auto',
                    html5: {
                        vhs: {
                            overrideNative: true
                        },
                        nativeAudioTracks: false,
                        nativeVideoTracks: false
                    }
                });
            }
        }
        
        // Carregar canais
        async function loadChannels() {
            try {
                const response = await fetch(`${API_URL}?username=${USERNAME}&password=${PASSWORD}&action=get_channels`);
                allChannels = await response.json();
                
                // Carregar categorias
                const categoriesRes = await fetch(`${API_URL}?username=${USERNAME}&password=${PASSWORD}&action=get_categories`);
                const categories = await categoriesRes.json();
                
                renderCategories(categories);
                renderChannels();
                
                initPlayer();
                
            } catch (error) {
                console.error('Erro ao carregar canais:', error);
                document.getElementById('channels-container').innerHTML = '<div class="loading">❌ Erro ao carregar canais. Verifique sua conexão.</div>';
            }
        }
        
        // Renderizar categorias
        function renderCategories(categories) {
            const container = document.getElementById('categories');
            container.innerHTML = '';
            
            // Botão "Todos"
            const allBtn = document.createElement('button');
            allBtn.className = `category-btn ${currentCategory === 'all' ? 'active' : ''}`;
            allBtn.textContent = '📺 Todos';
            allBtn.onclick = () => {
                currentCategory = 'all';
                renderCategories(categories);
                renderChannels();
            };
            container.appendChild(allBtn);
            
            // Botões de categorias
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${currentCategory === cat.category_name ? 'active' : ''}`;
                btn.textContent = cat.category_name;
                btn.onclick = () => {
                    currentCategory = cat.category_name;
                    renderCategories(categories);
                    renderChannels();
                };
                container.appendChild(btn);
            });
        }
        
        // Renderizar canais
        function renderChannels() {
            const container = document.getElementById('channels-container');
            
            let filteredChannels = allChannels;
            
            // Filtrar por categoria
            if (currentCategory !== 'all') {
                filteredChannels = filteredChannels.filter(ch => ch.category_name === currentCategory);
            }
            
            // Filtrar por busca
            if (searchTerm) {
                filteredChannels = filteredChannels.filter(ch => 
                    ch.name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            if (filteredChannels.length === 0) {
                container.innerHTML = '<div class="loading">📭 Nenhum canal encontrado</div>';
                return;
            }
            
            // Criar grid
            const grid = document.createElement('div');
            grid.className = 'channels-grid';
            
            filteredChannels.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.onclick = () => playChannel(channel);
                
                const logo = document.createElement('img');
                logo.className = 'channel-card-logo';
                logo.src = channel.stream_icon || 'https://via.placeholder.com/50x50?text=TV';
                logo.onerror = () => {
                    logo.src = 'https://via.placeholder.com/50x50?text=TV';
                };
                
                const name = document.createElement('div');
                name.className = 'channel-card-name';
                name.textContent = channel.name;
                
                card.appendChild(logo);
                card.appendChild(name);
                grid.appendChild(card);
            });
            
            container.innerHTML = '';
            container.appendChild(grid);
        }
        
        // Reproduzir canal
        function playChannel(channel) {
            if (!player) {
                initPlayer();
            }
            
            player.src({ src: channel.url, type: 'application/x-mpegURL' });
            player.play();
            
            // Atualizar info
            document.getElementById('channel-info').style.display = 'block';
            document.getElementById('current-channel-name').textContent = channel.name;
            document.getElementById('current-category').textContent = channel.category_name;
            
            // Scroll para o topo
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // Busca ao vivo
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderChannels();
        });
        
        // Carregar tudo
        loadChannels();
    </script>
</body>
</html>
